- name: Setup Kubernetes Worker Nodes
  hosts: k8s_workers
  become: yes

  vars:
    kube_version: "1.29.6-1.1"


  tasks:

  ##################################################
  # Disable Swap
  ##################################################

  - name: Disable swap immediately
    command: swapoff -a

  - name: Disable swap permanently
    replace:
      path: /etc/fstab
      regexp: '^(.*swap.*)$'
      replace: '#\1'

  ##################################################
  # Kernel Modules
  ##################################################

  - name: Create k8s kernel modules file
    copy:
      dest: /etc/modules-load.d/k8s.conf
      content: |
        overlay
        br_netfilter

  - name: Load overlay module
    shell: lsmod | grep -q overlay || modprobe overlay
    changed_when: false

  - name: Load br_netfilter module
    shell: lsmod | grep -q br_netfilter || modprobe br_netfilter
    changed_when: false

  ##################################################
  # Sysctl
  ##################################################

  - name: Configure sysctl settings
    copy:
      dest: /etc/sysctl.d/k8s.conf
      content: |
        net.bridge.bridge-nf-call-iptables=1
        net.bridge.bridge-nf-call-ip6tables=1
        net.ipv4.ip_forward=1

  - name: Apply sysctl
    command: sysctl --system

  ##################################################
  # Dependencies
  ##################################################

  - name: Install required packages
    apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gpg
      state: present
      update_cache: yes

  ##################################################
  # Install Containerd
  ##################################################

  - name: Download containerd
    shell: |
      curl -L \
      https://github.com/containerd/containerd/releases/download/v1.7.14/containerd-1.7.14-linux-amd64.tar.gz \
      -o /tmp/containerd.tar.gz
    args:
      creates: /tmp/containerd.tar.gz

  - name: Extract containerd
    unarchive:
      src: /tmp/containerd.tar.gz
      dest: /usr/local
      remote_src: yes

  - name: Create systemd directory
    file:
      path: /usr/local/lib/systemd/system
      state: directory

  - name: Download containerd service file
    shell: |
      curl -L \
      https://raw.githubusercontent.com/containerd/containerd/main/containerd.service \
      -o /usr/local/lib/systemd/system/containerd.service
    args:
      creates: /usr/local/lib/systemd/system/containerd.service

  - name: Create containerd directory
    file:
      path: /etc/containerd
      state: directory

  - name: Generate containerd config
    shell: |
      containerd config default > /etc/containerd/config.toml
    args:
      creates: /etc/containerd/config.toml


  - name: Enable systemd cgroup
    replace:
      path: /etc/containerd/config.toml
      regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'

  - name: Set pause image
    replace:
      path: /etc/containerd/config.toml
      regexp: 'sandbox_image = ".*"'
      replace: 'sandbox_image = "registry.k8s.io/pause:3.9"'


  - name: Reload systemd
    systemd:
      daemon_reload: yes

  - name: Start containerd
    systemd:
      name: containerd
      enabled: yes
      state: started


  ##################################################
  # Install runc
  ##################################################

  - name: Download runc
    shell: |
      curl -L \
      https://github.com/opencontainers/runc/releases/download/v1.1.12/runc.amd64 \
      -o /tmp/runc.amd64
    args:
      creates: /tmp/runc.amd64

  - name: Install runc
    command: install -m 755 /tmp/runc.amd64 /usr/local/sbin/runc

  ##################################################
  # Install CNI plugins
  ##################################################

  - name: Download CNI plugins
    shell: |
      curl -L \
      https://github.com/containernetworking/plugins/releases/download/v1.5.0/cni-plugins-linux-amd64-v1.5.0.tgz \
      -o /tmp/cni.tgz
    args:
      creates: /tmp/cni.tgz

  - name: Create CNI directory
    file:
      path: /opt/cni/bin
      state: directory

  - name: Extract CNI plugins
    unarchive:
      src: /tmp/cni.tgz
      dest: /opt/cni/bin
      remote_src: yes

  ##################################################
  # Kubernetes packages
  ##################################################

  - name: Create keyring directory
    file:
      path: /etc/apt/keyrings
      state: directory

  - name: Add Kubernetes GPG key
    shell: |
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | \
      gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    args:
      creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

  - name: Add Kubernetes repository
    copy:
      dest: /etc/apt/sources.list.d/kubernetes.list
      content: |
        deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /

  - name: Update apt
    apt:
      update_cache: yes

  - name: Install Kubernetes packages
    apt:
      name:
        - "kubelet={{ kube_version }}"
        - "kubeadm={{ kube_version }}"
        - "kubectl={{ kube_version }}"
      state: present

  - name: Hold Kubernetes packages
    dpkg_selections:
      name: "{{ item }}"
      selection: hold
    loop:
      - kubelet
      - kubeadm
      - kubectl
